name: OpenWiki Update

# Scheduled job that regenerates openwiki/ documentation using the real
# `openwiki` CLI (https://github.com/langchain-ai/openwiki), recomputes the
# Agile-V manifest/source-map/freshness records, and opens a PR with any
# changes. Mirrors upstream's example workflow:
# https://github.com/langchain-ai/openwiki/blob/main/examples/openwiki-update.yml
#
# Requires repository secrets for an inference provider (see
# docs/integrations/openwiki.md). Until those secrets are configured, the
# "Run OpenWiki" step will fail at the API-call stage; this is expected and
# does not block merging this workflow definition itself.

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agilev
        run: |
          pip install -e .

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          # TODO: Replace with your preferred inference provider and model.
          # See docs/integrations/openwiki.md for configuration options.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: z-ai/glm-5.2
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: openwiki
          LANGCHAIN_TRACING_V2: "true"

      - name: Recompute Agile-V wiki manifest
        run: |
          agilev wiki update

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            openwiki
            .agile-v/wiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow. It
            refreshes `openwiki/` via the `openwiki` CLI and recomputes the
            Agile-V manifest/source-map/freshness records under
            `.agile-v/wiki/`.
